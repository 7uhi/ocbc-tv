<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OCBC Daily — SGI-USA Orange County Buddhist Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-mark"><img src="assets/logo.png" alt=""></span>
      <div class="brand-text">
        <span class="brand-name">Orange County Buddhist Center</span>
        <span class="brand-sub">SGI-USA &middot; South Orange County</span>
      </div>
    </div>
    <div class="datetime">
      <div id="clock">–:–</div>
      <div id="date">&nbsp;</div>
    </div>
  </header>

  <main>
    <section class="today-panel">
      <h2>Today at the Center</h2>
      <div id="event-list" class="event-list">
        <div class="loading">Loading today&rsquo;s schedule&hellip;</div>
      </div>
      <div id="events-note" class="events-note"></div>
    </section>

    <aside class="quote-panel">
      <div class="quote-head">
        <div class="quote-kicker">Daily Encouragement</div>
        <h2 class="quote-title">Towards 2030 <em>with Ikeda Sensei</em></h2>
      </div>
      <div id="quote-body" class="quote-body">
        <div class="loading light">Loading today&rsquo;s guidance&hellip;</div>
      </div>
      <div id="quote-source" class="quote-source"></div>
    </aside>
  </main>

  <footer>
    <div class="week-label">This<br>Week</div>
    <div id="week-strip" class="week-strip"></div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
